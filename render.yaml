services:
  - type: web
    name: finance-dashboard-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SWAGGER_SERVER_URL
        value: https://finance-dashboard-api.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false